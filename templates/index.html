<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="twitter:description" content="Download YouTube videos in any quality from 360p to 4K. Extract audio as MP3.">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "YouTube Downloader",
        "description": "Download YouTube videos in any quality from 360p to 4K. Extract audio as MP3.",
        "applicationCategory": "Multimedia",
        "operatingSystem": "All",

        }

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a1a;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.15);
            --text: #f0f0f5;
            --text-muted: #8888a0;
            --accent-1: #8b5cf6;
            --accent-2: #ec4899;
            --accent-3: #06b6d4;
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.5;
        }
        .bg-glow {
            position: fixed;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(139,92,246,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        header {
            text-align: center;
            margin-bottom: 36px;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card-pad { padding: 20px; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
        }
        .input-group input::placeholder { color: #555; }
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(139,92,246,0.25);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(139,92,246,0.35);
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .error {
            color: #f87171;
            text-align: center;
            font-size: 0.9rem;
            margin: 8px 0;
            min-height: 1.4em;
        }
        .loading {
            text-align: center;
            padding: 48px 20px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(139,92,246,0.15);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text-muted); font-size: 0.9rem; }

        .video-info {
            display: none;
            margin-top: 20px;
        }
        .video-info.show { display: block; }
        .video-header {
            display: flex;
            gap: 16px;
            padding: 16px;
        }
        .video-header img {
            width: 180px;
            min-height: 100px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
        }
        .video-meta { flex: 1; min-width: 0; }
        .video-meta h2 {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta .channel {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2px;
        }
        .video-meta .duration {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .progress-section {
            display: none;
            margin: 0 16px 16px;
            padding: 16px;
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.15);
            border-radius: var(--radius-sm);
        }
        .progress-section.show { display: block; }
        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .progress-top .label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .progress-top .pct {
            font-size: 0.85rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent-1);
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .progress-status {
            text-align: center;
            margin-top: 8px;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .progress-status.completed { color: #34d399; }
        .progress-status.error { color: #f87171; }

        .formats-section { padding: 0 16px 16px; }
        .formats-section:first-of-type { padding-top: 8px; }
        .formats-section h3 {
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 6px;
        }
        .format-btn {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
            text-align: left;
            font-family: inherit;
            font-size: 0.82rem;
        }
        .format-btn:hover {
            border-color: var(--accent-1);
            background: rgba(139,92,246,0.08);
            transform: translateY(-1px);
        }
        .format-btn:active { transform: scale(0.98); }
        .format-btn .fmt-label { display: block; font-weight: 600; }
        .format-btn .fmt-meta { display: block; font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-down {
            animation: slideDown 0.35s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .container { padding: 20px 12px 40px; }
            header h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            .video-header { flex-direction: column; }
            .video-header img { width: 100%; max-height: 200px; }
            .format-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 400px) {
            .format-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <main class="container">
        <header>
            <h1>YouTube Downloader</h1>
            <p>Download YouTube videos in any quality — 360p to 4K, plus MP3 audio</p>
        </header>

        <section class="card card-pad" style="margin-bottom:16px;" aria-label="Search and download">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste a YouTube URL..." spellcheck="false" aria-label="YouTube video URL" />
                <button class="btn btn-primary" id="fetchBtn" onclick="fetchInfo()" aria-label="Get video information">Get Info</button>
            </div>
            <div id="error" class="error" role="alert"></div>
        </section>

        <div id="loading" class="card" style="display:none;" role="status">
            <div class="loading">
                <div class="spinner"></div>
                <p>Fetching video information...</p>
            </div>
        </div>

        <article id="videoInfo" class="video-info" aria-label="Video details and download options">
            <div class="card fade-in">
                <div class="video-header">
                    <img id="thumbnail" src="" alt="Video thumbnail" />
                    <div class="video-meta">
                        <h2 id="videoTitle"></h2>
                        <p class="channel" id="videoChannel"></p>
                        <p class="duration" id="videoDuration"></p>
                    </div>
                </div>

                <div id="progressSection" class="progress-section slide-down" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Download progress">
                    <div class="progress-top">
                        <span class="label">Downloading</span>
                        <span class="pct" id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-meta">
                        <span id="progressSpeed">-</span>
                        <span id="progressEta">-</span>
                    </div>
                    <div class="progress-status" id="progressStatus">Starting download...</div>
                </div>

                <section class="formats-section" aria-label="Video formats">
                    <h3>Video</h3>
                    <div id="video-formats" class="format-grid"></div>
                </section>
                <section class="formats-section" aria-label="Audio formats">
                    <h3>Audio Only</h3>
                    <div id="audio-formats" class="format-grid"></div>
                </section>
            </div>
        </article>
    </main>

    <script>
        let currentVideoId = null;
        let currentUrl = '';
        let progressInterval = null;

        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
        }

        function clearError() {
            document.getElementById('error').textContent = '';
        }

        async function fetchInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) { showError('Please enter a YouTube URL'); return; }
            clearError();
            currentUrl = url;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('videoInfo').classList.remove('show');
            document.getElementById('progressSection').classList.remove('show');
            document.getElementById('fetchBtn').disabled = true;

            try {
                const res = await fetch('/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Failed to fetch video info');
                    return;
                }

                document.getElementById('thumbnail').src = data.thumbnail || '';
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoChannel').textContent = data.channel;
                document.getElementById('videoDuration').textContent = 'Duration: ' + formatDuration(data.duration);

                renderVideoFormats(data.best_qualities, data.best_video_only);
                renderAudioFormats(data.audio_formats);

                document.getElementById('videoInfo').classList.add('show');
            } catch (e) {
                showError('Network error: ' + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('fetchBtn').disabled = false;
            }
        }

        function renderVideoFormats(combined, videoOnly) {
            const container = document.getElementById('video-formats');
            let all = [];
            (combined || []).forEach(f => { f._audio = 'included'; all.push(f); });
            (videoOnly || []).forEach(f => { f._audio = 'merged'; all.push(f); });
            all.sort((a, b) => (b.height || 0) - (a.height || 0));

            if (all.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);padding:8px 0;">No video formats available</p>';
                return;
            }

            let html = '';
            all.forEach(f => {
                let label = `${f.height || '?'}p - ${f.ext.toUpperCase()}`;
                let meta = '';
                if (f.filesize) meta += f.filesize;
                if (f.tbr) meta += (meta ? ' | ' : '') + f.tbr + ' kbps';
                let badge = f._audio === 'included' ? 'Audio incl.' : 'Audio merged';
                html += `
                    <button class="format-btn" onclick="startDownload('${f.format_id}', 'video')" aria-label="Download ${label}">
                        <span class="fmt-label">${label}</span>
                        <span class="fmt-meta">${badge}${meta ? ' | ' + meta : ''}</span>
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        function renderAudioFormats(formats) {
            const container = document.getElementById('audio-formats');
            if (!formats || formats.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);padding:8px 0;">No audio formats available</p>';
                return;
            }
            let html = '';
            formats.forEach(f => {
                let label = f.label || `Audio - ${f.ext.toUpperCase()}`;
                let meta = '';
                if (f.filesize) meta += f.filesize;
                if (f.tbr) meta += (meta ? ' | ' : '') + f.tbr + ' kbps';
                html += `
                    <button class="format-btn" onclick="startDownload('${f.format_id}', 'audio')" aria-label="Download ${label}">
                        <span class="fmt-label">${label}</span>
                        ${meta ? '<span class="fmt-meta">' + meta + '</span>' : ''}
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        async function startDownload(formatId, type) {
            clearError();
            const ps = document.getElementById('progressSection');
            ps.classList.add('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressSpeed').textContent = '-';
            document.getElementById('progressEta').textContent = '-';
            document.getElementById('progressStatus').textContent = 'Starting download...';
            document.getElementById('progressStatus').className = 'progress-status';
            ps.setAttribute('aria-valuenow', '0');

            ps.scrollIntoView({ behavior: 'smooth', block: 'center' });

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: currentUrl,
                        format_id: formatId,
                        type: type
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('progressStatus').textContent = 'Error: ' + (data.error || 'Download failed');
                    document.getElementById('progressStatus').className = 'progress-status error';
                    return;
                }

                currentVideoId = data.video_id;
                if (progressInterval) clearInterval(progressInterval);
                progressInterval = setInterval(() => pollProgress(currentVideoId), 1000);
            } catch (e) {
                document.getElementById('progressStatus').textContent = 'Error: ' + e.message;
                document.getElementById('progressStatus').className = 'progress-status error';
            }
        }

        async function pollProgress(videoId) {
            try {
                const res = await fetch('/progress/' + videoId);
                const data = await res.json();

                document.getElementById('progressFill').style.width = data.percent + '%';
                document.getElementById('progressPercent').textContent = data.percent + '%';
                document.getElementById('progressSection').setAttribute('aria-valuenow', data.percent);

                if (data.speed) document.getElementById('progressSpeed').textContent = data.speed;
                if (data.eta) document.getElementById('progressEta').textContent = data.eta;

                if (data.status === 'completed') {
                    document.getElementById('progressStatus').textContent = 'Download completed!';
                    document.getElementById('progressStatus').className = 'progress-status completed';
                    clearInterval(progressInterval);
                    if (data.filename) {
                        window.location.href = '/downloads/' + encodeURIComponent(data.filename);
                    }
                } else if (data.status === 'error') {
                    document.getElementById('progressStatus').textContent = 'Error: ' + (data.error || 'Download failed');
                    document.getElementById('progressStatus').className = 'progress-status error';
                    clearInterval(progressInterval);
                } else if (data.status === 'finished') {
                    document.getElementById('progressStatus').textContent = 'Processing...';
                } else {
                    document.getElementById('progressStatus').textContent = 'Downloading...';
                }

                if (data.status === 'completed' || data.status === 'error') {
                    clearInterval(progressInterval);
                }
            } catch (e) {
                // ignore polling errors
            }
        }
    </script>
</body>
</html>
